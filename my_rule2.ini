custom_proxy_group=🇯🇵 日本节点`select`(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(家宽|游戏|剩余|流量)).)*$
custom_proxy_group=🇸🇬 加坡节点`select`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量)).)*$
custom_proxy_group=🇺🇸 美国节点`select`(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))^((?!(深港|家宽|游戏|剩余|流量)).)*$
custom_proxy_group=🌐 其他地区`select`(^(?!.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore|美|US|United States)).*)
custom_proxy_group=🇭🇰 香港故转`fallback`(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong))^((?!(深港|家宽|游戏|剩余|流量)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾故转`fallback`(?=.*(台湾|tw))^((?!(游戏|剩余|流量)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本故转`fallback`(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(家宽|游戏|剩余|流量)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 加坡故转`fallback`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🍃 香港均衡`load-balance(round-robin)`(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong))^((?!(家宽|游戏|剩余|流量)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;启用自定义规则集

enable_rule_generator=true
overwrite_original_rules=true

;DNS 配置 - 防泄漏
[dns]
enable=true
ipv6=false
listen=0.0.0.0:53
;用于解析 DNS 服务器本身的 bootstrap DNS
default-nameserver=223.5.5.5,119.29.29.29
proxy-server-nameserver=https://dns.google/dns-query,https://1.1.1.1/dns-query
;国内域名使用国内 DNS
nameserver=223.5.5.5,119.29.29.29,https://doh.pub/dns-query
;国外域名使用可信 DNS（防污染 + 防泄漏）
fallback=https://dns.google/dns-query,https://1.1.1.1/dns-query,https://doh.opendns.com/dns-query
;如果 nameserver 返回的 IP 不是中国大陆 IP，则使用 fallback 结果
fallback-filter=geoip,geoip-code=CN

